name: Backfill Snapshots

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Year to backfill (leave blank for full 2025+2026)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout mde-data
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MDE_DATA_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run backfill
        run: |
          if [ -n "${{ github.event.inputs.year }}" ]; then
            python3 backfill.py --year ${{ github.event.inputs.year }}
          else
            python3 backfill.py
          fi

      - name: Commit and push new snapshots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            COUNT=$(git diff --cached --name-only | wc -l)
            git commit -m "backfill: add $COUNT snapshot(s)"
            git push
          fi
